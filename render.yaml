services:
  - type: web
    name: voicedin
    runtime: node
    rootDir: backend
    buildCommand: "npm install"
    preDeployCommand: "npm run migrate"
    startCommand: "npm start"
    healthCheckPath: "/api/health"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://voicedin2.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: voicedin2
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
