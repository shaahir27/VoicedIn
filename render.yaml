services:
  - type: web
    name: voicedin
    runtime: node
    rootDir: backend
    buildCommand: "npm install && npx puppeteer browsers install chrome"
    preDeployCommand: "npm run migrate"
    startCommand: "npm start"
    healthCheckPath: "/api/health"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: http://localhost:5173,http://127.0.0.1:5173,https://voicedin2.onrender.com,https://voicedin.lat,https://www.voicedin.lat
      - key: API_PUBLIC_URL
        value: https://voicedin.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: voicedin-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: voicedin2
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://voicedin.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: voicedin-db
    plan: free
